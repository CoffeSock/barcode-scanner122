<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Native Barcode Scanner</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #111;
      color: white;
    }

    video {
      width: 90%;
      max-width: 400px;
      margin-top: 20px;
      border-radius: 10px;
    }

    #result {
      margin-top: 20px;
      font-size: 24px;
      word-break: break-all;
    }

    #status {
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<h2>Barcode Scanner</h2>

<video id="video" autoplay></video>
<div id="result">Waiting...</div>
<div id="status"></div>

<script>
const video = document.getElementById("video");
const resultDiv = document.getElementById("result");
const statusDiv = document.getElementById("status");

let stream;
let detector;

// -------------------- CHECK SUPPORT --------------------
if (!("BarcodeDetector" in window)) {
  resultDiv.textContent = "BarcodeDetector NOT supported in this browser";
  statusDiv.textContent = "Use Chrome (Android/Desktop) or Edge";
} else {
  init();
}

// -------------------- INIT --------------------
async function init() {
  try {
    statusDiv.textContent = "Requesting camera...";

    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: "environment"
      }
    });

    video.srcObject = stream;
    await video.play();

    statusDiv.textContent = "Starting detector...";

    detector = new BarcodeDetector({
      formats: [
        "ean_13",
        "ean_8",
        "upc_a",
        "upc_e",
        "code_128",
        "code_39",
        "itf"
      ]
    });

    scanLoop();

  } catch (err) {
    console.error(err);
    resultDiv.textContent = "Camera error / permission denied";
  }
}

// -------------------- SCAN LOOP --------------------
async function scanLoop() {
  try {
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      const barcodes = await detector.detect(video);

      if (barcodes.length > 0) {
        const value = barcodes[0].rawValue;
        resultDiv.textContent = "FOUND: " + value;
        statusDiv.textContent = "Scan complete";

        // Optional: stop camera after success
        stream.getTracks().forEach(t => t.stop());
        return;
      } else {
        statusDiv.textContent = "Scanning...";
      }
    }
  } catch (err) {
    console.error(err);
    statusDiv.textContent = "Detection error (retrying...)";
  }

  requestAnimationFrame(scanLoop);
}
</script>

</body>
</html>
</html>
