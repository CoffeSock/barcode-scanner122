<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Barcode Scanner</title>
  <script src="https://unpkg.com/@zxing/library@latest"></script>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
    }
    video {
      width: 90%;
      max-width: 400px;
      margin-top: 20px;
      border-radius: 10px;
    }
    #result {
      margin-top: 20px;
      font-size: 24px;
    }
  </style>
</head>
<body>

  <h2>Scan Barcode</h2>
  <video id="video"></video>
  <div id="result">Waiting...</div>

  <script>
    const codeReader = new ZXing.BrowserMultiFormatReader();
    const resultDiv = document.getElementById('result');

    async function startScanner() {
      try {
        const devices = await codeReader.listVideoInputDevices();
        const backCamera = devices.find(device =>
        device.label.toLowerCase().includes('back') ||
        device.label.toLowerCase().includes('rear')
        );

        const selectedDeviceId = backCamera?.deviceId || devices[0]?.deviceId;

        if (!selectedDeviceId) {
          resultDiv.textContent = "No camera found";
          return;
        }

        codeReader.decodeFromVideoDevice(selectedDeviceId, 'video', (result, err) => {
          if (result) {
            resultDiv.textContent = result.getText();

            // Optional: stop after successful scan
            codeReader.reset();
          }

          if (err && !(err instanceof ZXing.NotFoundException)) {
            console.error(err);
            resultDiv.textContent = "Error: " + err;
          }
        });

      } catch (error) {
        console.error(error);
        resultDiv.textContent = "Camera access denied or not available";
      }
    }

    startScanner();
  </script>

</body>
</html>
